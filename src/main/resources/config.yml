# ============================================================
#  EscoltaCore - config.yml
# ============================================================

# Storage backend: "sqlite" or "mysql"
storage: sqlite

mysql:
  host: localhost
  port: 3306
  database: escoltacore
  username: root
  password: password
  pool-size: 5

game-loop:
  # Minimum players needed to start any game
  min-players: 2
  # Max players for PUBLIC arenas (admin-created)
  max-players-public: 8
  # Max players for PRIVATE lobbies (player-created)
  max-players-private: 5
  # Seconds before auto-start when a public lobby fills up
  countdown: 10

random-objective:
  # ── Blacklist ───────────────────────────────────────────────────────────────
  # Materials that will NEVER be chosen as the objective in full-random mode.
  # Ignored when sprite-pool is active.
  blacklist:
    - BEDROCK
    - BARRIER
    - COMMAND_BLOCK
    - CHAIN_COMMAND_BLOCK
    - REPEATING_COMMAND_BLOCK
    - END_PORTAL_FRAME
    - STRUCTURE_VOID
    - LIGHT
    - SPAWNER
    - DRAGON_EGG
    - REINFORCED_DEEPSLATE
    - STRUCTURE_BLOCK
    - JIGSAW

  # ── Sprite pool ─────────────────────────────────────────────────────────────
  # When this list is populated, ONLY these materials will be chosen as objectives.
  # Each entry must have a matching PNG in plugins/EscoltaCore/sprites/<MATERIAL>.png
  # (16x16 or higher resolution, will be scaled to 128x128 on the map).
  #
  # Leave empty to use full-random mode (blacklist applies instead).
  #
  # Currently supported sprites (shipped with the plugin):
  #   DIAMOND, EMERALD, GOLD_INGOT, IRON_INGOT, COAL,
  #   OAK_LOG, STONE, OBSIDIAN, SAND, GRAVEL
  #
  # To add more: drop a PNG named <MATERIAL_NAME>.png into
  # plugins/EscoltaCore/sprites/ and add the material name here.
  sprite-pool:
    - DIAMOND
    - EMERALD
    - GOLD_INGOT
    - IRON_INGOT
    - COAL
    - OAK_LOG
    - STONE
    - OBSIDIAN
    - SAND
    - GRAVEL
